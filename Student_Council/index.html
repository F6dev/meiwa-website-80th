<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トップページ｜M高校生徒会</title>
    <meta name="description" content="こちらは愛知県立明和高等学校生徒会公式ウェブサイトです。明和高校の基本的な情報や行事、生徒会活動や部活動の情報などを掲載しています。" />
    <!-- ブラウザの電話番号を自動検出し、自動リンク化するのを防ぐ。 -->
    <meta name="format-detection" content="telephone=no" />
    <!-- アイコン設定 -->
    <link rel="icon" sizes="16x16" href="./src/images/icon/favicon-16x16.png">
    <link rel="icon" sizes="32x32" href="./src/images/icon/favicon-32x32.png">
    <!-- Webフォント(事前)読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
    <!-- グローバルのCSSとJSの読み込み -->
    <link rel="stylesheet" href="./src/common/normalize.css">
    <link rel="stylesheet" href="./src/common/common.css">
    <script src="./src/common/common.js"></script>
    <!-- ローカルのCSSとJSの読み込み -->
    <link rel="stylesheet" href="./indexTopHero.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./indexBg.js" defer></script>
</head>

<body>
    <common-header></common-header>
    <main>
        <div class="top-hero">
            <div class="hero-plane">
                <div class="plane-box">
                    <img src="./src/images/top/plane.svg">
                </div>
            </div>
            <div class="hero-bg">
                <img src="./src/images/top/nagoya-town.svg">
            </div>
            <div class="hero-title">
                <span class="title-ja"><br>A県立<wbr>M<wbr>高等学校<wbr>生徒会<br></span>
                <span class="title-en"><br>Student Council<wbr> of M High School<br></span>
            </div>
        </div>
        <!-- お知らせ→各ページへのボタン→（見出し？） -->
        <div class="main-contents">
            <div class="main-news">
                <div class="news-title">
                    <h2>お知らせ</h2>
                    <a class="news-link" href="/Student_Council/news/">すべて見る →</a>
                </div>
                <div class="news-list">
                    <ul>
                        <li class="news-item">
                            <span class="news-date">重要</span>
                            <p class="news-text" style="font-size: 24px;">このサイトはまだ開発中です！<br>公開されているサイトは<a href="https://meiwa.website" style="color: #000;">こちら</a></p>
                        </li>
                        <li class="news-item">
                            <span class="news-date">2026/8/10</span>
                            <p class="news-text">学校説明会の席の予約を開始しました！（予定）</p>
                        </li>
                        <li class="news-item">
                            <span class="news-date">2026/7/1</span>
                            <p class="news-text">生徒会HPの大幅リニューアルをしました！（予定）</p>
                        </li>
                        <li class="news-item">
                            <span class="news-date">2026/4/10</span>
                            <p class="news-text">このサイトの開発を開始</p>
                        </li>
                    </ul>
                </div>
            </div>
            
        </div>
    </main>
    <common-footer></common-footer>
</body>

</html>
