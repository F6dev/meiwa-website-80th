<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 個別設定 -->
    <title>学校説明会 | 明和祭2025</title>
    <link rel="icon" href="/School_Festival2025/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- defer属性を付けたらheadでも読み込めます -->
    <script src="/School_Festival2025/src/common.js" defer></script>
    <link rel="stylesheet" href="/School_Festival2025/src/common.css" />
  </head>
  <body>
    <common-header></common-header>
    <common-modal></common-modal>
    <main>
      <!-- メインコンテンツここからスタート -->
      <section
        id="meikaryouran"
        data-title="学校説明会"
        class="full-bleed"
        style="--bgcolor: #fff0f5; min-height: 98vh;"
      >
        <h1 class="common-title">学校説明会</h1><br />
        <b class="common-text-basic"
          >明和高校附属中学校の学校説明会はありません！</b
        >
        <p class="common-text-basic">
          今年は、仮設校舎(プレハブ)2階の社会科教室で明和高校説明会を行います。<br />
          今年度は席が一部予約制となっています。<br />
          当日に当日枠を開放する予定ですので、事前予約できなかった方は当日朝9時に予約サイトを確認してみてください。<br />
          また、会場の受付でのみ受け付けている席もありますので、当日予約枠を使用できなかった場合はそちらを検討してください。
        </p>
        <p class="common-text-basic">
          以下の明和高校生徒会HP上で文化祭についての情報・席予約ページを紹介しています。
        </p>
        <a class="common-btn common-btn-arrow common-btn-rounded" style="margin: 30px auto; padding-right: 65px; padding-left: 20px; background-color: #f0dec7" href="https://meiwa.website/Student_Council/news" target="_blank">https://meiwa.website/Student_Council/news</a>
      </section>
      <svg
        style="background-color: #fff0f5"
        class="wave-svg"
        viewBox="0 0 1200 100"
        preserveAspectRatio="none"
      >
        <path
          d="M0 50 Q 100 0, 200 50 T 400 50 T 600 50 T 800 50 T 1000 50 T 1200 50 V100 H0 Z"
          fill="#fba481"
        />
      </svg>
    </main>
    <common-footer></common-footer>
  </body>
</html>
