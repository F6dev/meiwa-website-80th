<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 個別設定 -->
    <title>投票結果 | 明和祭2025</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- defer属性を付けたらheadでも読み込めます -->
    <script src="/School_Festival2025/src/common.js" defer></script>
    <link rel="stylesheet" href="/School_Festival2025/src/common.css" />
  </head>
  <body>
    <common-header></common-header>
    <common-modal></common-modal>
    <main>
      <!-- メインコンテンツここからスタート -->
      <section
        id="meikaryouran"
        data-title="投票結果"
        class="full-bleed"
        style="--bgcolor: #fff0f5; min-height: 100vh"
      >
        <h1 class="common-title">アンケート</h1>
        <p class="common-text-basic">
          外来者の方に、今後の明和祭の運営の改善のためにアンケートを募集しています。<br />
          当日こちらのページで投票フォームを公開します。<br />
          ご協力お願いいたします。
        </p>
	<a class="common-btn common-btn-arrow common-btn-rounded" style="margin: 30px auto; padding-right: 65px; padding-left: 20px; background-color: #f0dec7" href="https://meiwa.website/School_Festival2025/Redirect/Survey" target="_blank">アンケートに移動する（外部リンクが開きます）</a>
      </section>
      <svg
        style="background-color: #f5f4f0"
        class="wave-svg"
        viewBox="0 0 1200 100"
        preserveAspectRatio="none"
      >
        <path
          d="M0 50 Q 100 0, 200 50 T 400 50 T 600 50 T 800 50 T 1000 50 T 1200 50 V100 H0 Z"
          fill="#fba481"
        />
      </svg>
    </main>
    <common-footer></common-footer>
  </body>
