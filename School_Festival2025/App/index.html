<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文化祭アプリ 用意中...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans JP", sans-serif;
        background: linear-gradient(135deg, #c2e0e9 0%, #9fcffc 100%);
        height: 100vh;
        overflow: hidden;
        cursor: default;
        user-select: none;
      }

      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        z-index: 10;
        position: relative;
        padding: 20px;
      }

      h1 {
        font-family: "RocknRoll One", sans-serif;
        font-weight: bolder;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        color: #fff;
        text-shadow: 0 4px 15px rgba(78, 168, 209, 0.4);
        margin-bottom: 1.5rem;
        letter-spacing: 2px;
      }

      p {
        color: #fff;
        font-size: clamp(1rem, 4vw, 1.5rem);
        max-width: 600px;
        margin-bottom: 2.5rem;
        text-shadow: 0 3px 5px rgba(0, 0, 0, 0.1);
        line-height: 1.6;
      }

      .progress-bar {
        width: 80%;
        max-width: 400px;
        height: 12px;
        background-color: rgba(255, 255, 255, 0.3);
        border-radius: 6px;
        overflow: hidden;
        margin-top: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, #9ac9ff, #c4e0fa);
        animation: progress 6s ease-in-out infinite;
        border-radius: 6px;
        box-shadow: inset 0 -2px 5px rgba(0, 0, 0, 0.2);
      }

      @keyframes progress {
        0% {
          width: 0%;
        }
        50% {
          width: 60%;
        }
        100% {
          width: 0%;
        }
      }

      .decoration {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .paper-spark {
        position: absolute;
        font-size: clamp(1rem, 3vw, 2rem);
        animation-name: float;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(150px, -80px) rotate(15deg);
        }
        50% {
          transform: translate(300px, 0) rotate(5deg);
        }
        75% {
          transform: translate(150px, 80px) rotate(-10deg);
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }

      .lantern {
        position: absolute;
        width: clamp(15px, 3vw, 30px);
        height: clamp(25px, 5vw, 50px);
        background: #ff6b6b;
        border-radius: 50% 50% 0 0;
        box-shadow: 0 0 20px #ff9e80;
        animation: float 25s infinite ease-in-out;
        opacity: 0.7;
      }

      .confetti {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        pointer-events: none;
        animation: fall 1s ease-out forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(100px) rotate(360deg);
          opacity: 0;
        }
      }

      .balloon {
        position: absolute;
        width: clamp(10px, 2vw, 20px);
        height: clamp(15px, 3vw, 30px);
        background: #4da6ff;
        border-radius: 50%;
        bottom: 120px;
        animation: balloon-float 20s infinite linear;
      }

      @keyframes balloon-float {
        0% {
          transform: translate(0, 0);
          opacity: 1;
        }
        100% {
          transform: translate(100px, -100vh);
          opacity: 0;
        }
      }

      .balloon::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 30px;
        background: rgba(0, 0, 0, 0.2);
      }

      .emoji {
        position: absolute;
        font-size: clamp(1.2rem, 4vw, 2.5rem);
        animation: float 15s infinite ease-in-out;
        opacity: 0.8;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2.8rem;
          margin-bottom: 1rem;
        }
        p {
          font-size: 1.2rem;
          margin-bottom: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>明和祭2025アプリ 用意中...</h1>
      <p>現在明和祭2025アプリも鋭意準備中です！<br />もう暫くお待ち下さい！</p>
      <p>©2025 広報常任委員会</p>
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
    </div>

    <div class="decoration">
      <!-- Paper sparks -->
      <div
        class="paper-spark"
        style="top: 15%; left: 5%; animation-duration: 20s; animation-delay: 0s"
      >
        ✨️
      </div>
      <div
        class="paper-spark"
        style="
          top: 25%;
          right: 10%;
          animation-duration: 25s;
          animation-delay: 3s;
        "
      >
        ✨️
      </div>
      <div
        class="paper-spark"
        style="
          bottom: 25%;
          left: 15%;
          animation-duration: 30s;
          animation-delay: 6s;
        "
      >
        ✨️
      </div>

      <!-- Lanterns -->
      <div
        class="lantern"
        style="
          top: 10%;
          left: 20%;
          animation-duration: 35s;
          animation-delay: 1s;
        "
      ></div>
      <div
        class="lantern"
        style="
          top: 8%;
          right: 25%;
          animation-duration: 40s;
          animation-delay: 4s;
        "
      ></div>

      <!-- Balloons -->
      <div class="balloon" style="left: 10%; animation-delay: 0s"></div>
      <div
        class="balloon"
        style="left: 25%; animation-delay: 5s; background: #ff6b6b"
      ></div>
      <div
        class="balloon"
        style="left: 40%; animation-delay: 10s; background: #4dff88"
      ></div>
      <div
        class="balloon"
        style="left: 55%; animation-delay: 15s; background: #ffd166"
      ></div>
      <div
        class="balloon"
        style="left: 70%; animation-delay: 20s; background: #ee82ee"
      ></div>
      <div
        class="balloon"
        style="left: 85%; animation-delay: 25s; background: #00d2d3"
      ></div>

      <!-- Festive emojis -->
      <div class="emoji" style="top: 20%; right: 15%; animation-delay: 2s">
    🏃
      </div>
      <div class="emoji" style="top: 35%; left: 10%; animation-delay: 5s">
        🎇
      </div>
      <div class="emoji" style="bottom: 30%; right: 20%; animation-delay: 8s">
        🎲
      </div>
      <div class="emoji" style="bottom: 40%; left: 25%; animation-delay: 11s">
        📣
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const curtainPull = document.querySelector(".curtain-pull");
        const curtainLeft = document.querySelector(".curtain-left");
        const curtainRight = document.querySelector(".curtain-right");

        curtainPull.addEventListener("click", () => {
          // Open curtains with playful animation
          curtainLeft.style.transform = "translateX(-100%) skewX(-10deg)";
          curtainRight.style.transform = "translateX(100%) skewX(10deg)";

          // Create confetti explosion
          createConfetti(50);

          // Reset after 5 seconds
          setTimeout(() => {
            curtainLeft.style.transform = "skewX(-10deg)";
            curtainRight.style.transform = "skewX(10deg)";
          }, 5000);
        });

        // Click anywhere for confetti
        document.body.addEventListener("click", (e) => {
          if (e.target !== curtainPull) {
            createConfetti(10);
          }
        });

        function createConfetti(count) {
          for (let i = 0; i < count; i++) {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = `${Math.random() * 100}%`;
            confetti.style.top = `${Math.random() * 100}%`;
            confetti.style.backgroundColor = `hsl(${
              Math.random() * 360
            }, 100%, 60%)`;
            confetti.style.width = `${Math.random() * 8 + 5}px`;
            confetti.style.height = confetti.style.width;
            document.body.appendChild(confetti);

            setTimeout(() => {
              confetti.remove();
            }, 1000);
          }
        }
      });
    </script>
  </body>
</html>
